<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo libro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="lista-libros.html">
                <img src="img/libro.png" alt="Logo" width="30" height="30">
                La librería de Juancho</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menuPrincipal">
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle active" href="#" data-bs-toggle="dropdown">Géneros</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="lista-libros.html">Ciencia Ficción</a></li>
                            <li><a class="dropdown-item" href="lista-libros.html">Acción</a></li>
                            <li><a class="dropdown-item" href="lista-libros.html">Drama</a></li>
                            <li><a class="dropdown-item" href="lista-libros.html">Fantasía</a></li>
                            <li><a class="dropdown-item" href="lista-libros.html">Terror</a></li>
                            <li><a class="dropdown-item" href="lista-libros.html">Romance</a></li>
                            <li><a class="dropdown-item" href="lista-libros.html">Thriller</a></li>
                            <li><a class="dropdown-item" href="lista-libros.html">Aventura</a></li>
                        </ul>
                    </li>
                </ul>
                <form class="d-flex ms-auto">
                    <input class="form-control me-2" type="search" placeholder="Buscar...">
                    <button class="btn btn-outline-light" type="submit">Buscar</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container text-center my-5">
        <h1>Nuevo libro</h1>
    </div>

    <div class="col-md-6 mx-auto my-5">
        <form class="form-libro">
            <div class="mb-3">
                <label for="titulo" class="form-label">Título</label>
                <input type="text" class="form-control" id="titulo">
            </div>
            <div class="mb-3">
                <label for="autor" class="form-label">Autor</label>
                <input type="text" class="form-control" id="autor">
            </div>
            <div class="mb-3">
                <label for="editorial" class="form-label">Editorial</label>
                <input type="text" class="form-control" id="editorial">
            </div>
            <div class="mb-3">
                <label for="genero" class="form-label">Género</label>
                <select class="form-select" id="genero">
                    <option value="">-- Selecciona un género --</option>
                    <option value="ciencia-ficcion">Ciencia ficción</option>
                    <option value="accion">Acción</option>
                    <option value="drama">Drama</option>
                    <option value="fantasia">Fantasía</option>
                    <option value="terror">Terror</option>
                    <option value="romance">Romance</option>
                    <option value="thriller">Thriller</option>
                    <option value="aventura">Aventura</option>
                </select>
            </div>
            <div class="text-center my-5">
                <button type="submit" class="btn btn-success">Guardar libro</button>
            </div>
        </form>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
